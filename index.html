<!doctype html>
<html lang="el">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/spendwise-logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="/spendwise-logo.png">
  <title>SpendWise</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="initial-loader" class="flex flex-col items-center justify-center min-h-screen mesh-bg transition-colors duration-300 overflow-hidden" style="background-color: #1A1A1A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; transition: opacity 0.5s ease-out;">
    <!-- Ambient blobs -->
    <div class="ambient-glow absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 rounded-full bg-violet-600/25 blur-[80px] pointer-events-none" style="position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); width: 18rem; height: 18rem; border-radius: 9999px; background-color: rgba(124, 58, 237, 0.25); filter: blur(80px); pointer-events: none;"></div>
    <div class="absolute bottom-1/4 right-1/4 w-48 h-48 rounded-full bg-cyan-500/15 blur-[60px] pointer-events-none" style="position: absolute; bottom: 25%; right: 25%; width: 12rem; height: 12rem; border-radius: 9999px; background-color: rgba(6, 182, 212, 0.15); filter: blur(60px); pointer-events: none;"></div>

    <!-- Logo -->
    <div class="logo-container relative mb-8" style="position: relative; margin-bottom: 2rem;">
        <!-- Outer glow ring -->
        <div class="absolute inset-0 rounded-3xl bg-violet-600/40 blur-xl scale-110" style="position: absolute; inset: 0; border-radius: 1.5rem; background-color: rgba(124, 58, 237, 0.4); filter: blur(24px); transform: scale(1.1);"></div>
        <!-- Logo image -->
        <div class="relative z-10 w-24 h-24 flex items-center justify-center" style="position: relative; z-index: 10; width: 6rem; height: 6rem; display: flex; align-items: center; justify-content: center;">
            <img src="/spendwise-logo.png" alt="SpendWise Logo" class="w-24 h-24 drop-shadow-xl object-contain" style="width: 6rem; height: 6rem; object-fit: contain; filter: drop-shadow(0 20px 13px rgba(0, 0, 0, 0.03)) drop-shadow(0 8px 5px rgba(0, 0, 0, 0.08));" />
        </div>
    </div>

    <!-- App name -->
    <h1 class="text-3xl font-black tracking-tight mb-1.5 gradient-text animate-fade-in" style="font-size: 1.875rem; font-weight: 900; letter-spacing: -0.025em; margin-bottom: 0.375rem; color: #FFFFFF; background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        SpendWise
    </h1>
    <p class="text-sm text-gray-400 dark:text-gray-500 animate-fade-in mb-10" style="font-size: 0.875rem; color: #9ca3af; margin-bottom: 2.5rem;">
        Η οικονομία σου. Απλά.
    </p>

    <!-- Progress bar shimmer -->
    <div class="w-48 h-1 rounded-full bg-white/10 overflow-hidden" style="width: 12rem; height: 0.25rem; border-radius: 9999px; background-color: rgba(255, 255, 255, 0.1); overflow: hidden; margin-top: 1rem;">
        <div class="h-full rounded-full bg-gradient-to-r from-violet-600 via-cyan-400 to-violet-600 bg-[length:200%]" style="height: 100%; width: 0%; border-radius: 9999px; background: linear-gradient(to right, #7c3aed, #22d3ee, #7c3aed); background-size: 200%; animation: root-shimmer 2s linear infinite, root-progress 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;"></div>
    </div>
    <style>
      @keyframes root-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes root-progress {
        0% { width: 0%; }
        20% { width: 30%; }
        50% { width: 70%; }
        80% { width: 90%; }
        100% { width: 98%; }
      }
      @keyframes root-glow-pulse {
        0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      }
      @keyframes root-float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes root-fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      body { background-color: #1A1A1A; margin: 0; }
      .fade-out { opacity: 0 !important; pointer-events: none !important; }
      
      /* Apply inline animations to elements */
      #initial-loader h1, #initial-loader p { animation: root-fade-in 0.8s ease-out both; }
      #initial-loader p { animation-delay: 0.2s; }
      .ambient-glow { animation: root-glow-pulse 3s ease-in-out infinite; }
      .logo-container { animation: root-float 4s ease-in-out infinite; }
    </style>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
